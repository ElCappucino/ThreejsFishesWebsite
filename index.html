<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="experience">
      <div id="ui-layer">
        <h2>Customizer</h2>

        <label>Select Model</label>
        <select id="model-select">
            <option value="./capoo.glb">Capoo</option>
            <option value="./wooloo.glb">wooloo</option>
        </select>
      
        <label>Select Sound</label>
        <select id="sound-select">
            <option value="sounds/pop1.mp3">pop1 Pop</option>
            <option value="sounds/pop2.mp3">pop2</option>
            <option value="sounds/pop3.mp3">pop3</option>
        </select>
    </div>
    
      <canvas id="experience-canvas"></canvas>

    </div>

    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@v0.149.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@v0.149.0>/examples/jsm/"
      }
    }
    </script>
    <script type="module" src="./main.js"></script>
</body>
</html>
